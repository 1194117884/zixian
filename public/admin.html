<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>字见 · 管理后台</title>
    <link rel="stylesheet" href="/admin.css" />
  </head>
  <body>
    <main class="shell" hidden>
      <header><a href="/">字见</a><span>运营后台</span><small id="admin-email"></small></header>
      <section class="intro"><p>运营概览</p><h1>今天，创作正在发生。</h1><span id="updated-at">正在加载…</span></section>
      <section class="metrics" aria-live="polite">
        <article><span>注册用户</span><strong id="users-count">—</strong><small id="users-new">—</small></article>
        <article><span>保存作品</span><strong id="documents-count">—</strong><small id="documents-new">—</small></article>
        <article><span>成功生成</span><strong id="generations-count">—</strong><small id="credits-used">—</small></article>
        <article><span>实际收入</span><strong id="live-revenue">¥0.00</strong><small id="test-orders">测试订单 0 笔</small></article>
      </section>
      <section class="panel"><div><p>近 30 天</p><h2>创作与渠道用量</h2></div><div id="usage-summary" class="activity"></div></section>
      <section class="panel"><div><p>近期生成活动</p><h2>模型、渠道与 Token 消耗</h2></div><div id="recent-activity" class="activity"></div></section>
      <section class="panel"><div><p>渠道运行</p><h2>最近请求与故障转移</h2></div><div id="channel-runs" class="activity"></div></section>
      <section class="panel"><div><p>风格管理</p><h2>公开与已下架风格</h2></div><div id="style-moderation" class="moderation"></div></section>
      <section class="panel"><div><p>操作审计</p><h2>管理员近期操作</h2></div><div id="audit-logs" class="activity"></div></section>
      <section class="panel config"><div><p>AI 配置</p><h2>系统提示词与模型渠道</h2></div><p>每个渠道完全由你填写：平台、调用协议、接口地址、模型名称、Key 与所属等级。同一等级的可用渠道会均衡分配；遇到限流、并发上限、失效 Key 或上游故障会自动切换下一个账号。</p><form id="ai-config-form"><label>系统提示词<textarea id="system-prompt" maxlength="12000" required></textarea></label><div id="model-accounts" class="accounts"></div><button type="button" class="add-account">添加模型渠道</button><div class="config-actions"><small id="config-message"></small><button type="submit">保存 AI 配置</button></div></form></section>
    </main>
    <section id="access-denied" class="access"><p>字见 / 管理后台</p><h1>正在验证管理员权限…</h1><a href="/">返回创作台</a></section>
    <script src="/admin.js"></script>
  </body>
</html>
