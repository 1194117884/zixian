<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>字见 · 管理后台</title>
    <link rel="stylesheet" href="/admin.css" />
  </head>
  <body>
    <main class="shell" hidden>
      <header><a href="/">字见</a><span>运营后台</span><small id="admin-email"></small></header>
      <section class="intro"><p>运营概览</p><h1>今天，创作正在发生。</h1><span id="updated-at">正在加载…</span></section>
      <section class="metrics" aria-live="polite">
        <article><span>注册用户</span><strong id="users-count">—</strong><small id="users-new">—</small></article>
        <article><span>保存作品</span><strong id="documents-count">—</strong><small id="documents-new">—</small></article>
        <article><span>成功生成</span><strong id="generations-count">—</strong><small id="credits-used">—</small></article>
        <article><span>订单收入</span><strong>待接入</strong><small>支付上线后统计</small></article>
      </section>
      <section class="panel"><div><p>近期生成活动</p><h2>模型与积分消耗</h2></div><div id="recent-activity" class="activity"></div></section>
      <section class="panel config"><div><p>AI 配置</p><h2>系统提示词与模型渠道</h2></div><p>Key 写入后仅保存加密值，页面不会再次显示原文。留空表示保留现有 Key，并优先回退 Worker Secret。</p><form id="ai-config-form"><label>系统提示词<textarea id="system-prompt" maxlength="12000" required></textarea></label><div class="provider-grid"><label>DeepSeek 渠道<input data-provider="deepseek" data-field="baseUrl" type="url" placeholder="https://..."><input data-provider="deepseek" data-field="apiKey" type="password" autocomplete="new-password" placeholder="新的 API Key（留空不变）"><small id="deepseek-status">未配置</small></label><label>OpenAI 渠道<input data-provider="openai" data-field="baseUrl" type="url" placeholder="https://..."><input data-provider="openai" data-field="apiKey" type="password" autocomplete="new-password" placeholder="新的 API Key（留空不变）"><small id="openai-status">未配置</small></label><label>Anthropic 渠道<input data-provider="anthropic" data-field="baseUrl" type="url" placeholder="https://..."><input data-provider="anthropic" data-field="apiKey" type="password" autocomplete="new-password" placeholder="新的 API Key（留空不变）"><small id="anthropic-status">未配置</small></label></div><div class="config-actions"><small id="config-message"></small><button type="submit">保存 AI 配置</button></div></form></section>
    </main>
    <section id="access-denied" class="access"><p>字见 / 管理后台</p><h1>正在验证管理员权限…</h1><a href="/">返回创作台</a></section>
    <script src="/admin.js"></script>
  </body>
</html>
